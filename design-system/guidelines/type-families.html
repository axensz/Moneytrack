<!-- @dsCard group="Type" viewport="700x180" name="Families & Money Figures" subtitle="System sans for UI · mono for currency alignment" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--background); color: var(--foreground); display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .block .lab { font: var(--weight-medium) 11px var(--font-sans); letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted-foreground); margin-bottom: 8px; }
  .sans { font: 400 22px var(--font-sans); }
  .sans b { font-weight: 700; }
  .stack { font: 400 11px var(--font-mono); color: var(--muted-foreground); margin-top: 8px; }
  .money { font: var(--weight-bold) 26px var(--font-sans); color: var(--primary); font-variant-numeric: tabular-nums; }
  .money .row { display: flex; justify-content: space-between; width: 200px; }
</style>
</head>
<body>
  <div class="block">
    <div class="lab">Sans · UI</div>
    <div class="sans">Aa Bb Cc <b>123</b> $</div>
    <div class="stack">Arial, Helvetica, system-ui</div>
  </div>
  <div class="block">
    <div class="lab">Tabular figures · money</div>
    <div class="money">
      <div class="row"><span>+</span><span>$ 1.250.000</span></div>
      <div class="row" style="color:var(--destructive)"><span>−</span><span>$ 89.900</span></div>
    </div>
    <div class="stack">font-variant-numeric: tabular-nums</div>
  </div>
</body>
</html>
