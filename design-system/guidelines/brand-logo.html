<!-- @dsCard group="Brand" viewport="700x220" name="Logo & Wordmark" subtitle="MT monogram mark · two-tone wordmark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--background); display: flex; align-items: center; gap: 40px; }
  .mark { display: flex; align-items: center; gap: 18px; }
  .mark img { width: 84px; height: 84px; }
  .wordmark { font: var(--weight-bold) 38px var(--font-sans); }
  .wordmark .m { color: var(--primary); }
  .wordmark .t { color: #1f1f1f; }
  .sep { width: 1px; align-self: stretch; background: var(--border); }
  .on-dark { background: #0a0a0a; padding: 16px 22px; border-radius: var(--radius-lg); }
  .on-dark .t { color: #f3f4f6; }
  .on-dark .wordmark { font-size: 28px; }
  .cap { font: var(--weight-medium) 11px var(--font-sans); letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted-foreground); margin-top: 10px; }
</style>
</head>
<body>
  <div class="mark">
    <img src="../assets/icon-512x512.png" alt="MoneyTrack logo">
    <div>
      <div class="wordmark"><span class="m">Money</span><span class="t">Track</span></div>
      <div class="cap">Personal finance, tracked</div>
    </div>
  </div>
  <div class="sep"></div>
  <div class="on-dark">
    <div class="wordmark"><span class="m">Money</span><span class="t">Track</span></div>
  </div>
</body>
</html>
