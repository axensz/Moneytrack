<!-- @dsCard group="Components" viewport="700x520" name="Finance — StatCards, Transactions, Progress" subtitle="Metric tiles, transaction rows and the credit-usage bar" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--background); }
  .wrap { display: flex; flex-direction: column; gap: 22px; }
  .lab { font: var(--weight-medium) 11px var(--font-sans); letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted-foreground); margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .rows { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>
  <div id="root" class="wrap"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { StatCard, TransactionRow, ProgressBar } = window.MoneyTrackDesignSystem_daa395;
    const ic = (name) => (props) => {
      const ref = React.useRef(null);
      React.useEffect(() => { if (ref.current) { ref.current.innerHTML = ''; const el = window.lucide.createElement(window.lucide.icons[name]); el.setAttribute('width', props.size||16); el.setAttribute('height', props.size||16); ref.current.appendChild(el); } });
      return <span ref={ref} style={{display:'inline-flex'}} />;
    };
    const Wallet = ic('Wallet'), Up = ic('TrendingUp'), Down = ic('TrendingDown'), Cal = ic('Calendar');
    const Card = ic('CreditCard'), Swap = ic('ArrowRightLeft'), Clock = ic('Clock');

    function Demo() {
      return (
        <>
          <div>
            <div className="lab">StatCard · dashboard grid</div>
            <div className="grid">
              <StatCard tone="balance" label="Balance" value="$ 4.250.000" icon={Wallet} />
              <StatCard tone="income" label="Ingresos" period="este mes" value="$ 1.250.000" icon={Up} />
              <StatCard tone="expense" label="Gastos" period="este mes" value="$ 890.000" icon={Down} />
              <StatCard tone="pending" label="Pendientes" value="$ 120.000" icon={Cal} />
            </div>
          </div>
          <div>
            <div className="lab">TransactionRow · inline actions on hover</div>
            <div className="rows">
              <TransactionRow type="expense" icon={Card} description="Mercado Éxito" account="Bancolombia Crédito" category="Mercado" date="5 jun 2026" amount="89.900" badges={[{label:'Pendiente',tone:'warning',icon:Clock},{label:'3 cuotas',tone:'primary'}]} onEdit={()=>{}} onDelete={()=>{}} />
              <TransactionRow type="income" icon={Card} description="Salario" account="Bancolombia Ahorros" category="Salario" date="1 jun 2026" amount="3.200.000" />
              <TransactionRow type="transfer" icon={Swap} description="Pago tarjeta" account="Ahorros → Crédito" date="3 jun 2026" amount="500.000" />
            </div>
          </div>
          <div>
            <div className="lab">ProgressBar · credit usage</div>
            <div style={{display:'flex',flexDirection:'column',gap:16,maxWidth:420}}>
              <ProgressBar value={1310000} max={4000000} label="Cupo utilizado" detail="$ 1.310.000 / $ 4.000.000" autoWarn />
              <ProgressBar value={3500000} max={4000000} label="Cupo casi lleno" detail="$ 3.500.000 / $ 4.000.000" autoWarn />
              <ProgressBar value={72} max={100} tone="success" label="Meta de ahorro" detail="72%" />
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
