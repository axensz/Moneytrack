<!-- @dsCard group="Spacing" viewport="700x180" name="Radii & Shadows" subtitle="Rounded-lg cards · soft layered elevation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--background); display: flex; gap: 28px; align-items: center; }
  .group { display: flex; gap: 18px; align-items: center; }
  .sep { width: 1px; align-self: stretch; background: var(--border); }
  .box { width: 70px; height: 70px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: center; }
  .lab { font: 400 10px var(--font-mono); color: var(--muted-foreground); padding-bottom: 5px; }
  .elev { width: 80px; height: 70px; background: var(--card); border-radius: var(--radius-lg); display: flex; align-items: flex-end; justify-content: center; }
</style>
</head>
<body>
  <div class="group">
    <div class="box" style="border-radius:4px"><span class="lab">sm 4</span></div>
    <div class="box" style="border-radius:8px"><span class="lab">md 8</span></div>
    <div class="box" style="border-radius:12px"><span class="lab">lg 12</span></div>
    <div class="box" style="border-radius:9999px;width:70px"><span class="lab">full</span></div>
  </div>
  <div class="sep"></div>
  <div class="group">
    <div class="elev" style="box-shadow:var(--shadow-sm)"><span class="lab">sm</span></div>
    <div class="elev" style="box-shadow:var(--shadow-md)"><span class="lab">md</span></div>
    <div class="elev" style="box-shadow:var(--shadow-lg)"><span class="lab">lg</span></div>
    <div class="elev" style="box-shadow:var(--shadow-balance)"><span class="lab">balance</span></div>
  </div>
</body>
</html>
