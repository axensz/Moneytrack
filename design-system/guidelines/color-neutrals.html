<!-- @dsCard group="Colors" viewport="700x200" name="Surfaces & Neutrals" subtitle="Warm off-white canvas, white cards, warm greys" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--background); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); background: var(--card); }
  .chip { height: 72px; }
  .meta { padding: 8px 10px; }
  .name { font: var(--weight-semibold) 12px var(--font-sans); color: var(--foreground); }
  .hex { font: 400 11px var(--font-mono); color: var(--muted-foreground); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#faf9f7"></div><div class="meta"><div class="name">Background</div><div class="hex">#FAF9F7</div></div></div>
    <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="meta"><div class="name">Card</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#f5f4f1"></div><div class="meta"><div class="name">Muted</div><div class="hex">#F5F4F1</div></div></div>
    <div class="sw"><div class="chip" style="background:#6b6b6b"></div><div class="meta"><div class="name">Muted fg</div><div class="hex">#6B6B6B</div></div></div>
    <div class="sw"><div class="chip" style="background:#1f1f1f"></div><div class="meta"><div class="name">Foreground</div><div class="hex">#1F1F1F</div></div></div>
  </div>
</body>
</html>
