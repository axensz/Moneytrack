<!-- @dsCard group="Colors" viewport="700x200" name="Brand & Primary" subtitle="Violet 600 — the single product accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--background); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); background: var(--card); }
  .chip { height: 76px; }
  .meta { padding: 8px 10px; }
  .name { font: var(--weight-semibold) 13px var(--font-sans); color: var(--foreground); }
  .hex { font: 400 12px var(--font-mono); color: var(--muted-foreground); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#7c3aed"></div><div class="meta"><div class="name">Primary</div><div class="hex">#7C3AED</div></div></div>
    <div class="sw"><div class="chip" style="background:#8b5cf6"></div><div class="meta"><div class="name">Primary soft</div><div class="hex">#8B5CF6</div></div></div>
    <div class="sw"><div class="chip" style="background:#6d28d9"></div><div class="meta"><div class="name">Primary strong</div><div class="hex">#6D28D9</div></div></div>
    <div class="sw"><div class="chip" style="background:linear-gradient(135deg,#7c3aed,#8b5cf6)"></div><div class="meta"><div class="name">Gradient</div><div class="hex">135° primary</div></div></div>
  </div>
</body>
</html>
