
# CodeQL — análisis de seguridad (SAST) para JS/TS y los propios workflows.
# Tuneado para MoneyTrack: build-mode `none` (código interpretado, sin compilar)
# y query pack `security-extended` (más reglas, apto para una app de dinero).
name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Semanal, sábados 15:39 UTC. Atrapa CVEs nuevos aunque no haya commits.
    - cron: '39 15 * * 6'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # subir resul
      packages: read           # bajar query
      actions: read            # requerido en repos privados
      contents: read

    strategy:

      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions          # escanea tus .github/workflows/*.yml
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
