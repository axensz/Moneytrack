<!-- @dsCard group="Type" viewport="700x260" name="Type Scale" subtitle="System sans · headings to meta" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--background); color: var(--foreground); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .spec { width: 120px; flex-shrink: 0; font: 400 11px var(--font-mono); color: var(--muted-foreground); }
  .sample { font-family: var(--font-sans); color: var(--foreground); }
</style>
</head>
<body>
  <div class="row"><div class="spec">36 / 700</div><div class="sample" style="font-size:36px;font-weight:700;line-height:1.3">Balance total</div></div>
  <div class="row"><div class="spec">30 / 600</div><div class="sample" style="font-size:30px;font-weight:600">Tus cuentas</div></div>
  <div class="row"><div class="spec">20 / 600</div><div class="sample" style="font-size:20px;font-weight:600">Transacciones recientes</div></div>
  <div class="row"><div class="spec">16 / 400</div><div class="sample" style="font-size:16px">Cuerpo de texto, descripción de movimiento</div></div>
  <div class="row"><div class="spec">14 / 500</div><div class="sample" style="font-size:14px;font-weight:500;color:var(--muted-foreground)">Etiqueta de campo</div></div>
  <div class="row"><div class="spec">12 / 500</div><div class="sample" style="font-size:12px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted-foreground)">Mié, 5 jun 2026</div></div>
</body>
</html>
