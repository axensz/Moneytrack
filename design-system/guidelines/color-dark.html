<!-- @dsCard group="Colors" viewport="700x180" name="Dark Mode" subtitle="Near-black canvas, slate cards, violet borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: #0a0a0a; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid #4c1d95; background: #1f2937; }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font: var(--weight-semibold) 12px var(--font-sans); color: #ededed; }
  .hex { font: 400 11px var(--font-mono); color: #a3a3a3; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0a0a0a"></div><div class="meta"><div class="name">Background</div><div class="hex">#0A0A0A</div></div></div>
    <div class="sw"><div class="chip" style="background:#1f2937"></div><div class="meta"><div class="name">Card</div><div class="hex">#1F2937</div></div></div>
    <div class="sw"><div class="chip" style="background:#8b5cf6"></div><div class="meta"><div class="name">Primary</div><div class="hex">#8B5CF6</div></div></div>
    <div class="sw"><div class="chip" style="background:#4c1d95"></div><div class="meta"><div class="name">Border</div><div class="hex">#4C1D95</div></div></div>
    <div class="sw"><div class="chip" style="background:#581c87"></div><div class="meta"><div class="name">Balance</div><div class="hex">#581C87</div></div></div>
  </div>
</body>
</html>
